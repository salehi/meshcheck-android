// MeshCheck agent protocol — the Node <-> Platform contract.
//
// This is the single source of truth for every message exchanged on the
// bidirectional Protobuf-over-WebSocket stream. Both the platform and the
// agent generate Go message structs from this file; there are no gRPC
// service stubs, because there is no gRPC runtime (see
// doc/protocols/agent-protocol.md).
//
// Wire format: each WebSocket binary frame carries exactly one marshalled
// Envelope message. WebSocket already delimits messages, so no length-prefix
// or gRPC framing is layered on top.

syntax = "proto3";

package meshcheck.agent.v1;

option go_package = "meshcheck.io/platform/internal/agentpb;agentpb";

// === Outer envelope ===

// Every message in the bidirectional stream is wrapped in this envelope.
// The oneof determines what kind of message it is. New message types can
// be added without breaking older clients because oneof tolerates unknown
// fields.
message Envelope {
  string message_id = 1; // ULID; used for ACK correlation
  int64 sent_at = 2;     // unix milliseconds, sender's clock

  oneof body {
    ServerHello server_hello = 10;
    ClientHello client_hello = 11;
    Heartbeat heartbeat = 12;
    CapabilityUpdate capability_update = 13;

    TaskAssignment task = 20;
    TaskAck task_ack = 21;
    TaskCancel task_cancel = 22;

    ResultSubmit result = 30;
    ResultAck result_ack = 31;

    FlowControl flow_control = 40;
    Shutdown shutdown = 41;
    Error error = 42;
    UpdateAvailable update_available = 43;
  }
}

// === Lifecycle messages ===

message ServerHello {
  string node_id = 1;
  string instance_id = 2; // agent-gateway instance handling this connection
  int32 heartbeat_interval_seconds = 3;
  int32 max_concurrent_tasks = 4;
  repeated string supported_check_types = 5;
}

message ClientHello {
  string agent_version = 1;
  string platform = 2; // "linux/amd64", "windows/amd64", etc.
  Capabilities capabilities = 3;
  bytes ed25519_pubkey = 4; // the Node's Result-signing public key; registered
                            // by the platform on the first connection and
                            // immutable thereafter (see agent-protocol.md)
}

message Heartbeat {
  // Sent by the agent every heartbeat_interval_seconds.
  int32 current_load = 1; // current concurrent tasks executing
  int32 cpu_percent = 2;
  int64 memory_bytes = 3;
}

message CapabilityUpdate {
  Capabilities capabilities = 1;
}

message Capabilities {
  repeated string supported_check_types = 1; // "ping", "tcp", "http", ...
  bool can_send_icmp = 2;                     // platform-permitted raw socket access
  GeoLocation geo = 3;                        // deprecated: no longer stored (see note below)
  ConnectionClass connection_class = 4;       // self-declared
  string name = 5;                            // self-declared human-readable label;
                                              // need not be unique. An operator may
                                              // override it (admin_name) on the platform.

  // Note: ASN is NOT declared by the agent. The Platform resolves the Node's
  // ASN authoritatively from the source IP of the inbound WebSocket
  // connection, using a MaxMind GeoLite2/ASN MMDB lookup. See
  // doc/architecture/trust-and-scoring.md.
}

enum ConnectionClass {
  CONNECTION_CLASS_UNKNOWN = 0;
  CONNECTION_CLASS_VPS = 1;
  CONNECTION_CLASS_RESIDENTIAL_WIRED = 2;
  CONNECTION_CLASS_RESIDENTIAL_WIRELESS = 3;
  CONNECTION_CLASS_OFFICE = 4;
  CONNECTION_CLASS_MOBILE = 5;
}

message GeoLocation {
  string country_code = 1; // ISO 3166-1 alpha-2
  string region = 2;
  string city = 3;
}

// === Task delivery ===

message TaskAssignment {
  string task_id = 1;    // ULID, unique
  string check_id = 2;   // parent Check
  string check_type = 3; // "ping", "http", ...
  bytes parameters = 4;  // JSON-encoded, type-specific (matches checks.parameters jsonb)
  int64 deadline = 5;    // unix milliseconds; agent must complete by this
  int32 max_attempts = 6;
  string target = 7;     // the hostname, IP, or URL to check (matches checks.target)
}

message TaskAck {
  string task_id = 1;
  TaskAckStatus status = 2;
}

enum TaskAckStatus {
  TASK_ACK_UNKNOWN = 0;
  TASK_ACK_ACCEPTED = 1; // agent will execute
  TASK_ACK_REJECTED_OVERLOAD = 2;
  TASK_ACK_REJECTED_INCAPABLE = 3;
  TASK_ACK_REJECTED_INVALID = 4;
}

message TaskCancel {
  string task_id = 1;
  string reason = 2;
}

// === Result submission ===

message ResultSubmit {
  string task_id = 1;
  string check_id = 2;
  ResultOutcome outcome = 3;
  bytes measurements = 4; // JSON-encoded, type-specific (matches results.measurements jsonb)
  int64 started_at = 5;   // unix milliseconds
  int64 completed_at = 6;
  bytes signature = 7;    // Ed25519 signature over a canonical hash of fields 1-6
}

enum ResultOutcome {
  RESULT_OUTCOME_UNKNOWN = 0;
  RESULT_OUTCOME_PASS = 1;
  RESULT_OUTCOME_FAIL = 2;
  RESULT_OUTCOME_INCONCLUSIVE = 3;
  RESULT_OUTCOME_TIMEOUT = 4;
}

message ResultAck {
  string task_id = 1;
  bool persisted = 2;
}

// === Operational ===

message FlowControl {
  int32 max_inflight_tasks = 1; // dynamically adjusted by platform
}

message Shutdown {
  ShutdownReason reason = 1;
  int32 grace_seconds = 2;
}

enum ShutdownReason {
  SHUTDOWN_REASON_UNKNOWN = 0;
  SHUTDOWN_REASON_PLATFORM_RESTART = 1;
  SHUTDOWN_REASON_NODE_SUSPENDED = 2;
  SHUTDOWN_REASON_KEY_REVOKED = 3;
  SHUTDOWN_REASON_PROTOCOL_VIOLATION = 4;
}

message Error {
  string code = 1;
  string message = 2;
  string correlation_id = 3; // optional; ties to a specific message_id
}

// === Agent self-update ===

// UpdateAvailable tells an agent the platform wants it on a newer version. The
// platform sends it (at most once per connection) after ClientHello, once it
// knows the agent's current version, when an operator-set target version is
// newer. The agent fetches and verifies the signed manifest at manifest_url
// (Ed25519 over the manifest, plus a per-binary SHA-256), swaps its own binary,
// and restarts. An agent with auto-update disabled, or a build with no embedded
// release public key, ignores this message. See doc/decisions/agent-auto-update.md.
message UpdateAvailable {
  string target_version = 1; // semver the platform wants this agent on
  string manifest_url = 2;   // absolute URL of the signed release manifest JSON
  bool mandatory = 3;        // update even while tasks are in flight
}
